services:
  postgres:
    image: postgres:16-alpine
    container_name: drainpipe-postgres
    environment:
      POSTGRES_DB: cmdb
      POSTGRES_USER: cmdb
      POSTGRES_PASSWORD: cmdb_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmdb -d cmdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    container_name: drainpipe-pgweb
    ports:
      - "54654:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://cmdb:cmdb_dev@postgres:5432/cmdb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
