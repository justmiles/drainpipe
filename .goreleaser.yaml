version: 2

project_name: drainpipe

before:
  hooks:
    - sh -c "cd cmd && go mod tidy"

builds:
  - id: drainpipe
    dir: cmd
    main: .
    binary: drainpipe
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers_v2:
  - images:
      - "ghcr.io/justmiles/drainpipe"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    labels:
      org.opencontainers.image.title: drainpipe
      org.opencontainers.image.description: "Steampipe export to PostgreSQL — drain cloud resources into your own database"
      org.opencontainers.image.source: "https://github.com/justmiles/drainpipe"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"

release:
  github:
    owner: justmiles
    name: drainpipe
  draft: false
  prerelease: auto
