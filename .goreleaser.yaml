version: 2

project_name: drainpipe

before:
  hooks:
    - cd cmd && go mod tidy

builds:
  - id: drainpipe
    dir: cmd
    main: .
    binary: drainpipe
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/justmiles/drainpipe:{{ .Version }}-amd64"
      - "ghcr.io/justmiles/drainpipe:latest-amd64"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=drainpipe"
      - "--label=org.opencontainers.image.description=Steampipe export to PostgreSQL — drain cloud resources into your own database"
      - "--label=org.opencontainers.image.source=https://github.com/justmiles/drainpipe"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

  - id: arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/justmiles/drainpipe:{{ .Version }}-arm64"
      - "ghcr.io/justmiles/drainpipe:latest-arm64"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=drainpipe"
      - "--label=org.opencontainers.image.description=Steampipe export to PostgreSQL — drain cloud resources into your own database"
      - "--label=org.opencontainers.image.source=https://github.com/justmiles/drainpipe"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/justmiles/drainpipe:{{ .Version }}"
    image_templates:
      - "ghcr.io/justmiles/drainpipe:{{ .Version }}-amd64"
      - "ghcr.io/justmiles/drainpipe:{{ .Version }}-arm64"

  - name_template: "ghcr.io/justmiles/drainpipe:latest"
    image_templates:
      - "ghcr.io/justmiles/drainpipe:latest-amd64"
      - "ghcr.io/justmiles/drainpipe:latest-arm64"

release:
  github:
    owner: justmiles
    name: drainpipe
  draft: false
  prerelease: auto
